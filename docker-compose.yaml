name: "shortner"

services:
  cassandra:
    image: cassandra:5.0.8
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: "local-cluster"
      CASSANDRA_DC: "datacenter1"
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      HEAP_NEWSIZE: "128M"
      MAX_HEAP_SIZE: "512M"
    volumes:
      - cassandra_data:/var/lib/cassandra
      - ./internal/migrations/cassandra:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "[ $$(nodetool statusgossip) = running ]"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  cassandra-init:
    image: cassandra:5.0.8
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./internal/migrations/cassandra:/init
    entrypoint: >
      bash -c "
        echo 'Running CQL init scripts...' &&
        for f in /init/*.cql; do
          echo \"Executing $$f\" && cqlsh cassandra -f $$f;
        done &&
        echo 'Init complete.'
      "
    restart: on-failure

  clickhouse:
    image: clickhouse/clickhouse-server:25.8
    restart: unless-stopped
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # Native
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    environment:
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_USER=admin
      - CLICKHOUSE_PASSWORD=admin
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  redis:
    image: redis:8.6
    restart: unless-stopped
    command: ["redis-server", "--aclfile", "/etc/redis/users.acl"]
    ports:
      - "6379:6379"              
    volumes:
      - redis-data:/data
      - ./users.acl:/etc/redis/users.acl
  
  redis-analytics:
    image: redis:8.6
    restart: unless-stopped
    command: ["redis-server", "--aclfile", "/etc/redis/users.acl"]            
    ports:
      - "6380:6379"              
    volumes:
      - redis-analytics-data:/data
      - ./users.acl:/etc/redis/users.acl
    
  redis-insight:
    image: redis/redisinsight:3.2
    restart: unless-stopped
    ports:
      - "5540:5540"
    volumes:
      - redis-insight-data:/data
    depends_on:
      - redis
      - redis-analytics
    extra_hosts:
      - "host.docker.internal:host-gateway"
  
  nginx-proxy:
    image: nginx:1.30.3
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cassandra_data:
  clickhouse_data:
  clickhouse_logs:
  redis-data:
  redis-analytics-data:
  redis-insight-data:
  kafka-data: